name: Benchmark this PR
on:
  pull_request_target:
    branches: [ master ]  # change to your default branch

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: zsoerenm/AirspeedVelocity.jl@ss/fix-sources-resolution
        with:
          julia-version: '1'
          extra-pkgs: 'RecursiveArrayTools'
          job-summary: 'true'
