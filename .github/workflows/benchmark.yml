name: Benchmark this PR
on:
  pull_request_target:
    branches: [ master ]  # change to your default branch

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: '1'
          extra-pkgs: 'RecursiveArrayTools'
          job-summary: 'true'
